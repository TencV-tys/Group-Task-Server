<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Forgot Password - GroupTask</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px; 
            max-width: 450px; 
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: #ffffff;
            padding: 32px 24px;
            border-radius: 24px;
            width: 100%;
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Logo Section */
        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2b8a3e 0%, #1e6b2c 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(43, 138, 62, 0.25);
        }
        
        .logo span {
            font-size: 28px;
            font-weight: 900;
            color: white;
        }
        
        .logo-check {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            position: absolute;
            margin-top: -25px;
            margin-left: 25px;
        }
        
        h2 { 
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: #868e96;
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        /* Form Styles */
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #868e96;
            margin-bottom: 8px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input { 
            width: 100%; 
            padding: 14px 16px;
            font-size: 16px;
            border: 1.5px solid #e9ecef;
            border-radius: 14px;
            background: #f8f9fa;
            transition: all 0.2s ease;
            font-family: inherit;
            color: #212529;
            outline: none;
        }
        
        input:focus {
            border-color: #2b8a3e;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(43, 138, 62, 0.1);
        }
        
        input::placeholder {
            color: #adb5bd;
        }
        
        /* Button Styles */
        button { 
            background: linear-gradient(135deg, #2b8a3e 0%, #1e6b2c 100%);
            color: white;
            padding: 14px 20px;
            border: none;
            width: 100%;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 12px rgba(43, 138, 62, 0.3);
        }
        
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(43, 138, 62, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        /* Success Container */
        .success-container {
            text-align: center;
            margin: 20px 0;
            animation: fadeInUp 0.5s ease-out;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d3f9d8 0%, #b2f2bb 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        
        .success-icon span {
            font-size: 40px;
        }
        
        .success-title {
            color: #2b8a3e;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        
        .success-message {
            color: #495057;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 32px;
            padding: 0 16px;
        }
        
        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e9ecef;
        }
        
        .back-link a {
            color: #2b8a3e;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        
        .back-link a:hover {
            color: #1e6b2c;
            text-decoration: underline;
        }
        
        /* Alert Styles */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-error {
            background: #fff5f5;
            border: 1px solid #fa5252;
            color: #fa5252;
        }
        
        .alert-success {
            background: #d3f9d8;
            border: 1px solid #2b8a3e;
            color: #2b8a3e;
        }
        
        /* Loading State */
        .loading {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            
            .container {
                padding: 24px 20px;
            }
            
            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-container">
            <div class="logo">
                <span>GT</span>
            </div>
            <div style="position: relative;">
                <span style="position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(43,138,62,0.8);">✓</span>
            </div>
        </div>
        
        <h2>Forgot Password?</h2>
        <p class="subtitle">Enter your email and we'll send you a reset link</p>
        
        <!-- Alert Container -->
        <div id="alertContainer"></div>
        
        <!-- Form Container -->
        <div id="formContainer">
            <div class="form-group">
                <label>EMAIL ADDRESS</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email"
                    autocomplete="email"
                    required
                />
            </div>
            <button id="sendButton" onclick="sendResetLink()">
                Send Reset Link
            </button>
        </div>

        <!-- Success Container (Hidden by default) -->
        <div id="successContainer" style="display: none;">
            <div class="success-container">
                <div class="success-icon">
                    <span>📧</span>
                </div>
                <div class="success-title">Check Your Email!</div>
                <div class="success-message" id="successMessage"></div>
                <button onclick="openApp()" style="margin-top: 8px;">
                    Open GroupTask App
                </button>
            </div>
        </div>

        <!-- Back Link -->
        <div class="back-link">
            <a href="#" onclick="openApp()">← Back to Login</a>
        </div>
    </div>

    <script>
        function showAlert(message, type = 'error') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            
            // Clear previous alerts
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                if (alertDiv.parentNode) {
                    alertDiv.style.opacity = '0';
                    setTimeout(() => {
                        if (alertDiv.parentNode) {
                            alertDiv.remove();
                        }
                    }, 300);
                }
            }, 5000);
        }
        
        async function sendResetLink() {
            const email = document.getElementById('email').value;
            const sendButton = document.getElementById('sendButton');
            
            // Clear previous alerts
            document.getElementById('alertContainer').innerHTML = '';
            
            // Validate email
            if (!email) {
                showAlert('Please enter your email address', 'error');
                return;
            }
            
            // Email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('Please enter a valid email address (e.g., john@example.com)', 'error');
                return;
            }
            
            // Show loading state
            sendButton.classList.add('loading');
            const originalButtonText = sendButton.innerHTML;
            sendButton.innerHTML = 'Sending...';
            sendButton.disabled = true;
            
            try {
                const response = await fetch('/api/auth/users/forgot-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Show success message
                    document.getElementById('formContainer').style.display = 'none';
                    document.getElementById('successContainer').style.display = 'block';
                    document.getElementById('successMessage').textContent = result.message || 'We\'ve sent a password reset link to your email. Please check your inbox and spam folder.';
                } else {
                    // Show error from server
                    showAlert(result.message || 'Something went wrong. Please try again.', 'error');
                }
                
            } catch (error) {
                console.error('Network error:', error);
                showAlert('Network error. Please check your connection and try again.', 'error');
            } finally {
                // Reset button state
                sendButton.classList.remove('loading');
                sendButton.innerHTML = originalButtonText;
                sendButton.disabled = false;
            }
        }
        
        function openApp() {
            const IP='10.189.87.2';
            // Try to open the app with deep link
            window.location.href = `exp://${IP}:8081/--/Login`;
            
            // Fallback: try to open app store if app isn't installed
            setTimeout(function() {
                // If still on this page after 1 second, app likely not installed
                // You can redirect to app store or show a message
                console.log('App not opened, might need to install');
            }, 1000);
        }
        
        // Handle Enter key press on input
        document.getElementById('email').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendResetLink();
            }
        });
    </script>
</body>
</html>
