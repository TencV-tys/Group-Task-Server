<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reset Password - GroupTask</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px; 
            max-width: 450px; 
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: #ffffff;
            padding: 32px 24px;
            border-radius: 24px;
            width: 100%;
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Logo Section */
        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2b8a3e 0%, #1e6b2c 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(43, 138, 62, 0.25);
            position: relative;
        }
        
        .logo span {
            font-size: 32px;
            font-weight: 900;
            color: white;
        }
        
        .logo-check {
            position: absolute;
            top: -8px;
            right: -8px;
            font-size: 12px;
            background: white;
            width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2b8a3e;
            font-weight: bold;
        }
        
        h2 { 
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: #868e96;
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        /* Form Styles */
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #868e96;
            margin-bottom: 8px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        input { 
            width: 100%; 
            padding: 14px 16px;
            font-size: 16px;
            border: 1.5px solid #e9ecef;
            border-radius: 14px;
            background: #f8f9fa;
            transition: all 0.2s ease;
            font-family: inherit;
            color: #212529;
            outline: none;
        }
        
        input:focus {
            border-color: #2b8a3e;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(43, 138, 62, 0.1);
        }
        
        input::placeholder {
            color: #adb5bd;
        }
        
        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            color: #868e96;
            box-shadow: none;
            width: auto;
            margin: 0;
        }
        
        .password-toggle:hover {
            background: none;
            transform: translateY(-50%);
        }
        
        /* Button Styles */
        button { 
            background: linear-gradient(135deg, #2b8a3e 0%, #1e6b2c 100%);
            color: white;
            padding: 14px 20px;
            border: none;
            width: 100%;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 12px rgba(43, 138, 62, 0.3);
        }
        
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(43, 138, 62, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Success Container */
        .success-container {
            text-align: center;
            margin: 20px 0;
            animation: fadeInUp 0.5s ease-out;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d3f9d8 0%, #b2f2bb 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        
        .success-icon span {
            font-size: 48px;
        }
        
        .success-title {
            color: #2b8a3e;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        
        .success-message {
            color: #495057;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 32px;
            padding: 0 16px;
        }
        
        /* Error Container */
        .error-container {
            text-align: center;
            margin: 20px 0;
            animation: fadeInUp 0.5s ease-out;
        }
        
        .error-icon {
            width: 80px;
            height: 80px;
            background: #fff5f5;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        
        .error-icon span {
            font-size: 48px;
        }
        
        .error-title {
            color: #fa5252;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        
        .error-message {
            color: #495057;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 32px;
            padding: 0 16px;
        }
        
        /* Alert Styles */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-error {
            background: #fff5f5;
            border: 1px solid #fa5252;
            color: #fa5252;
        }
        
        .alert-success {
            background: #d3f9d8;
            border: 1px solid #2b8a3e;
            color: #2b8a3e;
        }
        
        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e9ecef;
        }
        
        .back-link a {
            color: #2b8a3e;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        
        .back-link a:hover {
            color: #1e6b2c;
            text-decoration: underline;
        }
        
        /* Loading State */
        .loading {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* Password Strength Indicator */
        .strength-container {
            margin-top: 8px;
        }
        
        .strength-bars {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
        }
        
        .strength-bar {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: #e9ecef;
            transition: all 0.3s ease;
        }
        
        .strength-bar.weak { background: #fa5252; }
        .strength-bar.fair { background: #fd7e14; }
        .strength-bar.good { background: #f59f00; }
        .strength-bar.strong { background: #2b8a3e; }
        
        .strength-text {
            font-size: 11px;
            color: #868e96;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            
            .container {
                padding: 24px 20px;
            }
            
            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-container">
            <div class="logo">
                <span>GT</span>
                <div class="logo-check">✓</div>
            </div>
        </div>
        
        <h2>Reset Password</h2>
        <p class="subtitle">Create a new password for your account</p>
        
        <!-- Alert Container -->
        <div id="alertContainer"></div>
        
        <!-- Form Container -->
        <div id="formContainer">
            <form id="resetForm">
                <input type="hidden" id="token" name="token">
                <input type="hidden" id="email" name="email">
                
                <div class="form-group">
                    <label>NEW PASSWORD</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Enter new password"
                            autocomplete="new-password"
                            required
                        />
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">👁️</button>
                    </div>
                    <div id="strengthContainer" class="strength-container"></div>
                </div>
                
                <div class="form-group">
                    <label>CONFIRM PASSWORD</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            placeholder="Confirm your new password"
                            autocomplete="new-password"
                            required
                        />
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">👁️</button>
                    </div>
                </div>
                
                <button type="submit" id="submitBtn">Reset Password</button>
            </form>
        </div>

        <!-- Success Container (Hidden by default) -->
        <div id="successContainer" style="display: none;">
            <div class="success-container">
                <div class="success-icon">
                    <span>✅</span>
                </div>
                <div class="success-title">Password Reset Successful!</div>
                <div class="success-message">
                    Your password has been successfully reset. You can now log in with your new password.
                </div>
                <button id="openAppBtn">Open App and Login</button>
                <div class="back-link" style="border-top: none; margin-top: 16px; padding-top: 0;">
                    <a href="#" onclick="openApp()">← Back to Login</a>
                </div>
            </div>
        </div>

        <!-- Error Container (Hidden by default) -->
        <div id="errorContainer" style="display: none;">
            <div class="error-container">
                <div class="error-icon">
                    <span>❌</span>
                </div>
                <div class="error-title">Reset Failed</div>
                <div class="error-message" id="errorMessage"></div>
                <button id="backToLoginBtn">Try Again</button>
                <div class="back-link" style="border-top: none; margin-top: 16px; padding-top: 0;">
                    <a href="#" onclick="openApp()">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get URL parameters
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const email = params.get('email');
        
        if (token) document.getElementById('token').value = token;
        if (email) document.getElementById('email').value = email;
        
        // Password strength calculator
        function getPasswordStrength(password) {
            if (!password) return { score: 0, label: '', color: '' };
            
            let score = 0;
            
            if (password.length >= 6) score++;
            if (password.length >= 10) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;
            
            if (score <= 1) return { score: 1, label: 'Weak', color: '#fa5252', class: 'weak' };
            if (score === 2) return { score: 2, label: 'Fair', color: '#fd7e14', class: 'fair' };
            if (score === 3) return { score: 3, label: 'Good', color: '#f59f00', class: 'good' };
            return { score: 4, label: 'Strong', color: '#2b8a3e', class: 'strong' };
        }
        
        // Update password strength indicator
        function updatePasswordStrength() {
            const password = document.getElementById('password').value;
            const strength = getPasswordStrength(password);
            const container = document.getElementById('strengthContainer');
            
            if (!password) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = `
                <div class="strength-bars">
                    <div class="strength-bar ${strength.score >= 1 ? strength.class : ''}"></div>
                    <div class="strength-bar ${strength.score >= 2 ? strength.class : ''}"></div>
                    <div class="strength-bar ${strength.score >= 3 ? strength.class : ''}"></div>
                    <div class="strength-bar ${strength.score >= 4 ? strength.class : ''}"></div>
                </div>
                <div class="strength-text" style="color: ${strength.color}">
                    ${strength.label}
                </div>
            `;
        }
        
        // Toggle password visibility
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const button = field.parentElement.querySelector('.password-toggle');
            
            if (field.type === 'password') {
                field.type = 'text';
                button.innerHTML = '🙈';
            } else {
                field.type = 'password';
                button.innerHTML = '👁️';
            }
        }
        
        // Show alert message
        function showAlert(message, type = 'error') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            
            setTimeout(() => {
                if (alertDiv.parentNode) {
                    alertDiv.style.opacity = '0';
                    setTimeout(() => {
                        if (alertDiv.parentNode) alertDiv.remove();
                    }, 300);
                }
            }, 5000);
        }
        
        // Open app function
        function openApp() {
            window.location.href = 'exp://192.168.1.18:8081/--/Login';
            
            setTimeout(() => {
                console.log('App not opened automatically');
            }, 1000);
        }
        
        // Handle form submission
        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // Clear previous alerts
            document.getElementById('alertContainer').innerHTML = '';
            
            // Validate passwords
            if (!password || !confirmPassword) {
                showAlert('Please fill in both password fields', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return;
            }
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = 'Resetting...';
            
            try {
                const response = await fetch('/api/auth/users/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        token: document.getElementById('token').value,
                        email: document.getElementById('email').value,
                        newPassword: password,
                        confirmPassword: confirmPassword
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Show success screen
                    document.getElementById('formContainer').style.display = 'none';
                    document.getElementById('successContainer').style.display = 'block';
                } else {
                    // Show error screen
                    document.getElementById('formContainer').style.display = 'none';
                    document.getElementById('errorContainer').style.display = 'block';
                    document.getElementById('errorMessage').textContent = result.message || 'Invalid or expired reset link. Please request a new one.';
                }
            } catch (error) {
                console.error('Network error:', error);
                showAlert('Network error. Please check your connection and try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.innerHTML = originalText;
            }
        };
        
        // Add password strength listener
        document.getElementById('password').addEventListener('input', updatePasswordStrength);
        
        // Open app buttons
        document.getElementById('openAppBtn')?.addEventListener('click', openApp);
        document.getElementById('backToLoginBtn')?.addEventListener('click', () => {
            window.location.href = 'exp://192.168.1.18:8081/--/Login';
        });
        
        // Handle Enter key on password fields
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('confirmPassword').focus();
            }
        });
        
        document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('resetForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
